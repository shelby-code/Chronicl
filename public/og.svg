<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#D4A017" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top gold bar -->
  <rect x="80" y="180" width="120" height="3" rx="2" fill="url(#gold)"/>

  <!-- Logo icon -->
  <rect x="80" y="200" width="44" height="44" rx="10" fill="rgba(212,160,23,0.15)"/>
  <path d="M102 208 L86 216 L102 224 L118 216 Z M86 230 L102 238 L118 230 M86 223 L102 231 L118 223" stroke="#D4A017" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Chronicl wordmark -->
  <text x="136" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#D4A017" letter-spacing="-0.5">Chronicl</text>
  <text x="136" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="rgba(156,163,175,0.5)" letter-spacing="3">WORLD HISTORY ATLAS</text>

  <!-- Main headline -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Explore the</text>
  <text x="80" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#gold)" letter-spacing="-2">Story of Humanity</text>

  <!-- Subtext -->
  <text x="80" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(156,163,175,0.7)">25 Civilizations · 49 Countries · 370+ Historical Events</text>

